apiVersion: v1
kind: Service
metadata:
  name: ai90-web
  labels:
    app.kubernetes.io/name: ai90
    app.kubernetes.io/component: web
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: ai90
    app.kubernetes.io/component: web
  ports:
    - port: 8090
      targetPort: 8090
      protocol: TCP
      nodePort: 31090
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai90-web
  labels:
    app.kubernetes.io/name: ai90
    app.kubernetes.io/component: web
    app.kubernetes.io/version: "latest"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: ai90
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai90
        app.kubernetes.io/component: web
        app.kubernetes.io/version: "latest"
    spec:
      containers:
        - name: ai90
          image: ai90:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai90-config
          env:
            - name: PORT
              value: "8090"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
